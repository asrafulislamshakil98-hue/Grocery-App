<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিস্তারিত রিপোর্ট - মুদি দোকান</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f8f9fa; }
        header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .container { padding: 15px; max-width: 1100px; margin: auto; }
        
        /* ফিল্টার সেকশন */
        .filter-section { background: white; padding: 20px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: flex-end; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-filter { background: #2980b9; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* টেবিল সেকশন */
        .table-card { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #34495e; color: white; font-weight: 500; }
        tr:hover { background: #fcfcfc; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .bg-success { background: #dff9fb; color: #2ecc71; }
        .bg-danger { background: #fab1a0; color: #d63031; }

        .back-btn { display: inline-block; margin-bottom: 15px; text-decoration: none; color: #2c3e50; font-weight: bold; }
    </style>

    <!-- ইনভয়েস মডাল (নতুন ডিজাইন) -->
    <div id="invoiceModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:center; justify-content:center; backdrop-filter: blur(5px);">
        <div id="memoContent" style="background:white; width:95%; max-width:450px; padding:25px; border-radius:20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); font-family: 'Courier New', Courier, monospace;">
        
            <div style="text-align:center; margin-bottom:15px;">
                <h2 style="margin:0; color:#2c3e50; text-transform: uppercase; letter-spacing: 2px;">ক্যাশ মেমো</h2>
                <div style="width:50px; height:2px; background:#2c3e50; margin:10px auto;"></div>
                <p id="invCustomer" style="margin:5px 0; font-size:1.1rem; font-weight:bold;"></p>
                <small id="invDate" style="color:#666;"></small>
            </div>
        
            <table style="width:100%; border-collapse:collapse; margin-top:10px; table-layout: fixed;">
                <thead>
                    <tr style="border-top: 1px dashed #333; border-bottom: 1px dashed #333;">
                        <th style="width: 22%; text-align:left; padding:8px 2px; font-size:0.75rem;">বারকোড</th>
                        <th style="width: 38%; text-align:left; padding:8px 2px; font-size:0.75rem;">নাম</th>
                        <th style="width: 15%; text-align:center; padding:8px 2px; font-size:0.75rem;">পরিমাণ</th>
                        <th style="width: 25%; text-align:right; padding:8px 2px; font-size:0.75rem;">দাম</th>
                    </tr>
                </thead>
                <tbody id="invItems" style="font-size:0.85rem;">
                   <!-- এখানে JS দিয়ে ডাটা আসবে -->
                </tbody>
            </table>

            <div style="margin-top:15px; border-top: 1px dashed #333; padding-top:10px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                    <span>মোট বিল:</span> <b id="invTotal" style="font-size:1.2rem;"></b>
                </div>
                <div style="display:flex; justify-content:space-between; color:#27ae60; margin-bottom:5px;">
                    <span>জমা টাকা:</span> <span id="invPaid"></span>
                </div>
                <div style="display:flex; justify-content:space-between; color:#e74c3c; font-weight:bold;">
                    <span>বাকি টাকা:</span> <span id="invDue"></span>
                </div>
            </div>

            <div style="text-align:center; margin-top:20px; border-top:1px solid #eee; padding-top:10px;">
                <small>ধন্যবাদ, আবার আসবেন!</small>
            </div>

            <!-- বাটনসমূহ -->
            <div class="no-print" style="display:flex; gap:10px; margin-top:25px;">
                <button onclick="deleteMemo()" style="flex:1; padding:12px; background:#ff7675; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-trash"></i> ডিলিট</button>
                <button onclick="window.print()" style="flex:1; padding:12px; background:#55efc4; color:#2d3436; border:none; border-radius:10px; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-print"></i> প্রিন্ট</button>
                <button onclick="closeInvoice()" style="flex:1; padding:12px; background:#dfe6e9; color:#2d3436; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">বন্ধ</button>
            </div>
        </div>
    </div>

    <style>
        @media print {
            body * { visibility: hidden; }
            #memoContent, #memoContent * { visibility: visible; }
            #memoContent { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; padding: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<header>
    <h1><i class="fa-solid fa-file-invoice"></i> বিক্রয়ের বিস্তারিত রিপোর্ট</h1>
</header>

<div class="container">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> ড্যাশবোর্ড</a>

    <div class="filter-section">
        <div class="filter-group">
            <label>শুরুর তারিখ</label>
            <input type="date" id="startDate">
        </div>
        <div class="filter-group">
            <label>শেষ তারিখ</label>
            <input type="date" id="endDate">
        </div>
        <button class="btn-filter" onclick="fetchReports()">রিপোর্ট দেখুন</button>
    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>তারিখ</th>
                    <th>কাস্টমার</th>
                    <th>পণ্যের নাম (পরিমাণ)</th>
                    <th>মোট বিল</th>
                    <th>জমা</th>
                    <th>বাকি</th>
                    <th>লাভ</th>
                </tr>
            </thead>
            <tbody id="reportTableBody">
                <!-- ডাটা এখানে আসবে -->
            </tbody>
        </table>
    </div>
</div>

<script src="js/reports.js"></script>
</body>
</html>
